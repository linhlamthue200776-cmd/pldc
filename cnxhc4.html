<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thi trắc nghiệm</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
  font-size: 18px;
}

/* ===== THANH TRÊN ===== */
.top {
  position: relative;
  height: 44px;
  margin-bottom: 15px;
}

/* NÚT TRỞ VỀ */
.back-btn {
  position: absolute;
  left: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* NÚT LÀM LẠI */
.reset-top {
  position: absolute;
  right: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* ĐIỂM Ở GIỮA */
#score {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 16px;
}

/* ===== KHUNG ===== */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

/* ===== CÂU HỎI ===== */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===== ĐÁP ÁN ===== */
.answer {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.answer:active { background: #eef; }
.correct { background: #c8f7c5; border-color: green; }
.wrong { background: #f7c5c5; border-color: red; }

/* ===== NÚT DƯỚI ===== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button.nav {
  flex: 1;
  padding: 14px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 300px;
  margin: 30% auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- THANH TRÊN -->
<div class="top">
  <button class="back-btn" onclick="goBack()">← Trở về</button>
  <div id="score">Đúng: 0 / 0</div>
  <button class="reset-top" onclick="resetQuiz()">🔄 Làm lại</button>
</div>

<div class="container">
  <h2 id="question"></h2>

    <button class="nav" onclick="nextQuestion()">Câu tiếp →</button>
  </div>
</div>

<!-- POPUP KẾT QUẢ -->
<div id="resultModal" class="modal">

    <h3>🎉 Hoàn thành</h3>
    <p id="finalScore"></p>
    <button onclick="okReload()">OK</button>

/* ===== TRỘN ===== */
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

/* ===== KHỞI TẠO ===== */
function startQuiz() {
  index = 0;
  score = 0;
  userAnswers = [];

  questions = JSON.parse(JSON.stringify(rawQuestions));
  shuffle(questions);

  questions.forEach(q => {
    const correct = q.a[q.c];
    shuffle(q.a);
    q.c = q.a.indexOf(correct);
  });

  loadQuestion();
}

/* ===== LOAD ===== */
function loadQuestion() {
  const q = questions[index];
  document.getElementById("question").innerText =
    `Câu ${index + 1}: ${q.q}`;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  q.a.forEach((text, i) => {
    const div = document.createElement("div");
    div.className = "answer";
    div.innerText = text;
    div.onclick = () => checkAnswer(div, i);
    answersDiv.appendChild(div);

    if (userAnswers[index] !== undefined) {
      if (i === q.c) div.classList.add("correct");
      if (i === userAnswers[index] && i !== q.c)
        div.classList.add("wrong");
      div.onclick = null;
    }
  });

  updateScore();
}

/* ===== CHỌN ===== */
function checkAnswer(el, i) {
  if (userAnswers[index] !== undefined) return;

  userAnswers[index] = i;

  if (i === questions[index].c) {
    el.classList.add("correct");
    score++;
  } else {
    el.classList.add("wrong");
    document.querySelectorAll(".answer")[questions[index].c]
      .classList.add("correct");
  }

  updateScore();
}

/* ===== ĐIỀU HƯỚNG ===== */
function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    loadQuestion();
  } else {
    showResult();
  }
}

function prevQuestion() {
  if (index > 0) {
    index--;
    loadQuestion();
  }
}

/* ===== MODAL ===== */
function showResult() {
  document.getElementById("finalScore").innerText =
    `Đúng: ${score} / ${questions.length}`;
  document.getElementById("resultModal").style.display = "block";
}

function okReload() {
  document.getElementById("resultModal").style.display = "none";
  startQuiz();
}

/* ===== LÀM LẠI ===== */
function resetQuiz() {
  if (confirm("Bạn có chắc muốn làm lại?")) {
    startQuiz();
  }
}

/* ===== ĐIỂM ===== */
function updateScore() {
  document.getElementById("score").innerText =
    `Đúng: ${score} / ${questions.length}`;
}

startQuiz();
function goBack() {
  window.history.back();
}
