<!DOCTYPE html>

<head>
<meta charset="UTF-8">

<title>Thi trắc nghiệm</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 15px;
  font-size: 18px;
}

/* ===== THANH TRÊN ===== */
.top {
  position: relative;
  height: 44px;
  margin-bottom: 15px;
}

/* NÚT TRỞ VỀ */
.back-btn {
  position: absolute;
  left: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* NÚT LÀM LẠI */
.reset-top {
  position: absolute;
  right: 0;
  background: #3498db;
  color: #fff;
  padding: 8px 14px;
  border-radius: 8px;
  font-size: 16px;
  border: none;
  cursor: pointer;
}

/* ĐIỂM Ở GIỮA */
#score {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  font-size: 16px;
}

/* ===== KHUNG ===== */
.container {
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

/* ===== CÂU HỎI ===== */
h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

/* ===== ĐÁP ÁN ===== */
.answer {
  border: 1px solid #ccc;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  cursor: pointer;
}

.answer:active { background: #eef; }
.correct { background: #c8f7c5; border-color: green; }
.wrong { background: #f7c5c5; border-color: red; }

/* ===== NÚT DƯỚI ===== */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button.nav {
  flex: 1;
  padding: 14px;
  font-size: 17px;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
}

/* ===== MODAL ===== */
.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

.modal-content {
  background: #fff;
  width: 90%;
  max-width: 300px;
  margin: 30% auto;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

.modal-content button {
  margin-top: 15px;
  padding: 12px;
  width: 100%;
  border-radius: 8px;
  border: none;
  background: #3498db;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>

<!-- THANH TRÊN -->
<div class="top">

  <button class="reset-top" onclick="resetQuiz()">🔄 Làm lại</button>

<div class="container">

</div>

let index = 0;
let answered = false;

function shuffle(array) {
  return array
    .map(v => ({ v, sort: Math.random() }))
    .sort((a, b) => a.sort - b.sort)
    .map(({ v }) => v);
}

function loadQuestion() {
  answered = false;
  const q = questions[index];
  document.getElementById("question").innerText =
    `Câu ${index + 1}: ` + q.q;

  const answersDiv = document.getElementById("answers");
  answersDiv.innerHTML = "";

  const mixed = q.a.map((text, i) => ({ text, i }));
  shuffle(mixed).forEach(ans => {
    const div = document.createElement("div");
    div.className = "answer";
    div.innerText = ans.text;
    div.onclick = () => checkAnswer(div, ans.i);
    answersDiv.appendChild(div);
  });
}

function checkAnswer(element, chosenIndex) {
  if (answered) return;
  answered = true;

  const q = questions[index];
  const all = document.querySelectorAll(".answer");

  all.forEach(a => a.onclick = null);

  if (chosenIndex === q.c) {
    element.classList.add("correct");
  } else {
    element.classList.add("wrong");
    all.forEach(a => {
      if (a.innerText === q.a[q.c]) {
        a.classList.add("correct");
      }
    });
  }
}

function nextQuestion() {
  index++;
  if (index >= questions.length) {
    alert("Bạn đã hoàn thành bài thi 🎉");
    index = 0;
  }
  loadQuestion();
}
